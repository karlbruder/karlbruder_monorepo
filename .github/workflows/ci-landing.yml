name: Validate Landing Page

on:
  pull_request:
    branches:
      - master
    paths:
      - 'landing/**'
      - '.github/workflows/ci-landing.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: landing

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

