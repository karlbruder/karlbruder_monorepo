services:
  db:
    image: postgres:17
    container_name: postgres_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kb-db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d kb-db"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: kb-frontend
    restart: unless-stopped

    environment:
      - VITE_API_URL=http://backend:8000

    depends_on:
      - backend

    ports:
      - "3000:80"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile 

    container_name: kb-backend

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/kb-db

    expose:
      - "8000"
      
            

volumes:
  postgres_data:

  